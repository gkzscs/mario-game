<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素冒险家 - Pixel Adventurer</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-overlay">
            <div id="score">分数: <span id="score-value">0</span></div>
            <div id="lives">生命: <span id="lives-value">3</span></div>
            <div id="coins">金币: <span id="coins-value">0</span></div>
        </div>
        <div id="start-screen">
            <h1>像素冒险家</h1>
            <p>Pixel Adventurer</p>
            <button id="start-btn">开始游戏</button>
            <div class="controls-info">
                <p>操作说明:</p>
                <p>← → 或 A D: 移动</p>
                <p>↑ 或 W 或 空格: 跳跃</p>
            </div>
        </div>
        <div id="game-over-screen" class="hidden">
            <h1>游戏结束</h1>
            <p>最终分数: <span id="final-score">0</span></p>
            <button id="restart-btn">重新开始</button>
        </div>
    </div>
    <script type="module" src="./js/main.js"></script>
</body>
</html>
